# Dependabot watches the dependency manifests below and opens PRs when a pinned
# version has a known vulnerability or a newer release is available.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Python dependencies (requirements.txt + requirements-dev.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Bundle routine updates into a single weekly PR instead of one-per-package.
      python-dependencies:
        patterns:
          - "*"

  # The actions used in .github/workflows (checkout, setup-python, ...)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
