# Type-checking config for pyright / Pylance (the VS Code checker).
#
# "basic" matches the editor default. The task interface is typed via the `Task` protocol (tasks.py)
# and the engine/model functions take `task: Task`, so attribute access on tasks resolves cleanly.
# Structural checks (undefined names, bad imports, wrong call args, return types) stay ON.
#
# The rules below are relaxed because they fire on this project's *legitimate* dynamic patterns, not on
# bugs (the test suite covers correctness):
#   - reportAttributeAccessIssue  : Streamlit's `st.session_state` is a dynamic key/value store.
#   - reportArgumentType          : torch accepts device as str OR torch.device interchangeably.
#   - reportOptional* / MemberAccess : tensors / grads / a version's `run` are populated after a
#                                      forward/backward/train pass (Optional until then, guarded where used).
#   - reportGeneralTypeIssues / reportIndexIssue : iterating / indexing dynamically-built nn.Module containers.
[tool.pyright]
typeCheckingMode = "basic"
exclude = ["tests"]              # the test suite is verified by running it; pyright checks the source modules
reportAttributeAccessIssue = "none"
reportArgumentType = "none"
reportOptionalSubscript = "none"
reportOptionalIterable = "none"
reportOptionalMemberAccess = "none"
reportGeneralTypeIssues = "none"
reportIndexIssue = "none"


# Linter (ruff). Focused on correctness, not style: the "F" (pyflakes) rules catch unused imports,
# dead variables, redefinitions, and f-string mistakes — the class of issue a type checker in basic
# mode does not report. Formatting / line length is left to the author (the code uses long, descriptive
# lines on purpose).
[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["F"]
